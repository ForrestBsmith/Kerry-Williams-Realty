<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Source Sans Pro', Arial, sans-serif;
    }

    .carousel-wrapper {
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background: #000;
    }

    .carousel-track {
      display: flex;
      width: 100%;
      height: 100%;
      animation: slideTrack var(--carousel-duration, 8s) linear infinite;
      animation-fill-mode: both;
      will-change: transform;
      animation-delay: var(--carousel-delay, 0s);
    }

    body.carousel-paused .carousel-track {
      animation-play-state: paused;
    }

    .slide {
      width: 100%;
      height: 100%;
      flex: 0 0 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .slide-final img {
      width: 60%;
      height: auto;
    }

    @keyframes slideTrack {
      {{#each CAROUSEL_TRACK_KEYFRAMES}}
        {{this.percent}}% {
          transform: translateX({{this.translate}});
        }
      {{/each}}
    }
  </style>
</head>

<body class="{{#if CAROUSEL_AUTO_PLAY}}carousel-running{{else}}carousel-paused{{/if}}" data-carousel-autoplay="{{CAROUSEL_AUTO_PLAY}}">
  <div class="carousel-wrapper" style="--slide-count: {{CAROUSEL_COUNT}}; --carousel-duration: {{CAROUSEL_DURATION}}s; --carousel-delay: {{CAROUSEL_START_DELAY}}s;">
    {{#if HAS_CAROUSEL}}
      <div class="carousel-track">
        {{#each CAROUSEL_PHOTOS}}
          <div class="slide {{#if this.isFinal}}slide-final{{/if}}">
            <img src="{{this.url}}" alt="Slide {{this.index}}">
          </div>
        {{/each}}
      </div>
    {{else}}
      <div class="slide">
        <img src="{{HERO_PHOTO_URL}}" alt="Single Slide">
      </div>
    {{/if}}
  </div>
  <script>
    (function() {
      function startCarousel() {
        document.body.classList.remove('carousel-paused');
        document.body.classList.add('carousel-running');
      }
      window.__startCarousel = startCarousel;
      const shouldAutoPlay = document.body.getAttribute('data-carousel-autoplay') !== 'false';
      if (shouldAutoPlay) {
        startCarousel();
      }
    })();
  </script>
</body>
</html>
