<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Card Template Preview</title>
  <script>
    // Preview-only hydration for local HTML viewers.
    // Runtime Apps Script rendering ignores <head> and only uses <body>.
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const renderApi = params.get('renderApi') || '';
      const selector = params.get('selector') || 'agent-card';
      const limit = params.get('limit') || '1';

      if (renderApi) {
        const join = renderApi.includes('?') ? '&' : '?';
        const url = `${renderApi}${join}action=render-photo-gen-from-sheets&selector=${encodeURIComponent(selector)}&limit=${encodeURIComponent(limit)}`;
        document.body.innerHTML = `<iframe src="${url}" title="Photo Gen Preview" style="display:block;width:100%;min-height:100vh;border:0;background:#f4f6f8;"></iframe>`;
        return;
      }

      const defaults = {
        '{{brandName}}': 'Kerry Williams Realty',
        '{{brandPrimary}}': '#d6a000',
        '{{brandDark}}': '#0c0c0f',
        '{{textureUrl}}': '../../grass.jpg',
        '{{logoUrl}}': '../../44realty.png',
        '{{title}}': 'Trusted local real estate guidance.',
        '{{agentName}}': 'Sample Agent',
        '{{subtitle}}': 'Residential Specialist',
        '{{ctaUrl}}': '#',
        '{{imageUrl}}': 'https://placehold.co/1200x800/e9edf2/5f6670?text=Agent+Photo',
        '{{badgeLabel}}': 'Agent Profile',
        '{{ctaLabel}}': 'Contact Agent',
        '{{footerLabel}}': 'AGENT PROFILE'
      };
      let html = document.body.innerHTML;
      Object.keys(defaults).forEach((token) => {
        html = html.split(token).join(defaults[token]);
      });
      document.body.innerHTML = html;
    });
  </script>
</head>
<body style="margin:0;padding:24px;background:#f4f6f8;">
<table width="100%" cellpadding="0" cellspacing="0" style="max-width:760px;margin:0 auto;border:1px solid #d6dcd2;border-radius:12px;overflow:hidden;box-shadow:0 8px 20px rgba(16,24,16,0.12);font-family:Georgia,'Times New Roman',serif;background:#ffffff;background-image:linear-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.3)), url('{{textureUrl}}');background-size:cover;background-position:center;">
  <tr>
    <td style="background:linear-gradient(120deg, #f2dd96, {{brandPrimary}});padding:18px 20px 16px;color:#111111;">
      <div style="font-size:28px;line-height:1.15;font-weight:700;letter-spacing:.01em;margin-top:6px;font-family:'Palatino Linotype','Book Antiqua',Palatino,serif;color:#000000;">{{agentName}}</div>
    </td>
  </tr>
  <tr>
    <td>
      <img src="{{imageUrl}}" alt="{{agentName}}" onerror="this.onerror=null;this.src='https://placehold.co/1200x800/e9edf2/5f6670?text=Agent+Photo';" style="width:100%;height:420px;display:block;object-fit:cover;background:#0f1318;">
    </td>
  </tr>
  <tr>
    <td style="padding:4px 12px 0;background:#ffffff;background-image:linear-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.3)), url('{{textureUrl}}');background-size:cover;background-position:center;">
      <div style="margin:0 0 4px;">
        <span style="display:inline-block;background:{{brandPrimary}};color:{{brandDark}};font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:8px 12px;border-radius:999px;">{{badgeLabel}}</span>
      </div>
      <div style="font-size:23px;color:#000000;line-height:1.25;margin:0 0 6px;font-weight:800;letter-spacing:.01em;font-family:'Palatino Linotype','Book Antiqua',Palatino,serif;">{{subtitle}}</div>
      <div style="font-size:18px;line-height:1.5;color:{{brandDark}};font-weight:600;margin:0 0 8px;letter-spacing:.005em;font-family:'Palatino Linotype','Book Antiqua',Palatino,serif;">{{title}}</div>
      <table width="100%" cellpadding="0" cellspacing="0" style="margin-top:0;">
        <tr>
          <td align="left" valign="middle" style="padding-top:3px;">
            <a href="{{ctaUrl}}" style="display:inline-block;padding:6px 10px;background:{{brandPrimary}};border:1px solid {{brandPrimary}};color:{{brandDark}};text-decoration:none;border-radius:8px;font-weight:800;font-size:12px;letter-spacing:.03em;">{{ctaLabel}}</a>
          </td>
          <td align="right" valign="middle" style="font-size:18px;color:#4f5660;letter-spacing:.015em;font-weight:800;text-transform:none;line-height:1;">
            <table cellpadding="0" cellspacing="0" border="0" align="right" style="border-collapse:collapse;">
              <tr>
                <td style="padding-right:8px;white-space:nowrap;color:{{brandDark}};">{{footerLabel}}</td>
                <td style="white-space:nowrap;">
                  <img src="{{logoUrl}}" alt="44 Realty" style="height:64px;display:block;">
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
