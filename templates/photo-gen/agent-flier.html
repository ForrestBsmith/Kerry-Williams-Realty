<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Branded Property Flier</title>
  <style>
    * {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    @page {
      size: Letter portrait;
      margin: 0.5in;
    }
    @media print {
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      body {
        background: #ffffff !important;
        padding: 0 !important;
      }
      .flyer-shell {
        box-shadow: none !important;
      }
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const defaults = {
        '{{brandName}}': 'Kerry Williams Realty',
        '{{brandPrimary}}': '#d6a000',
        '{{brandDark}}': '#0c0c0f',
        '{{logoUrl}}': '../../44realty.png',
        '{{title}}': 'Modern Hill Country Retreat',
        '{{statusLabel}}': 'For Sale',
        '{{propertyAddress}}': '8430 Willow Dr',
        '{{city}}': 'Austin, TX 78704',
        '{{price}}': '$631,427',
        '{{beds}}': '5',
        '{{baths}}': '4',
        '{{sqft}}': '4,249',
        '{{propertyType}}': 'Single Family',
        '{{yearBuilt}}': '2021',
        '{{lotSize}}': '0.41 ac',
        '{{description}}': 'Open-concept layout, chef kitchen, oversized primary suite, and private backyard built for entertaining.',
        '{{agentName}}': 'Mark Smith',
        '{{subtitle}}': 'Residential Specialist',
        '{{phone}}': '+1-222-333-4444',
        '{{email}}': 'kw@example.com',
        '{{ctaUrl}}': '#',
        '{{ctaLabel}}': 'Schedule a Tour',
        '{{imageUrl}}': '../../family.jpeg',
        '{{altImage1Url}}': '../../family.jpeg',
        '{{altImage2Url}}': '../../family.jpeg',
        '{{altImage3Url}}': '../../family.jpeg',
        '{{agentImageUrl}}': '../../realtor.jpg'
      };

      let html = document.body.innerHTML;
      Object.keys(defaults).forEach((token) => {
        html = html.split(token).join(String(defaults[token] || ''));
      });
      document.body.innerHTML = html;
    });
  </script>
</head>
<body style="margin:0;padding:20px;background:#eef1f4;">
  <table class="flyer-shell" width="100%" cellpadding="0" cellspacing="0" style="width:100%;max-width:816px;height:1056px;margin:0 auto;border:1px solid #d8d0c5;border-radius:8px;overflow:hidden;box-shadow:0 12px 30px rgba(12,12,15,0.12);background:#ffffff;background-image:linear-gradient(170deg,#fffdf9 0%,#f7efe4 48%,#ede2d4 100%);font-family:Arial,'Segoe UI',sans-serif;">
    <tr>
      <td style="padding:12px 12px 0;background:transparent;">
        <table width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td style="padding:0;position:relative;">
              <div style="position:relative;height:440px;overflow:hidden;background:#e9edf2;border-radius:2px;">
                <img src="{{imageUrl}}" alt="{{title}}" onerror="this.onerror=null;this.src='https://placehold.co/1600x920/e9edf2/5f6670?text=Main+Property+Photo';" style="width:100%;height:440px;display:block;object-fit:cover;">
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>

    <tr>
      <td style="padding:0 12px;background:transparent;">
        <table width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td width="68%" style="padding-right:8px;">
              <div style="background:{{brandDark}};background-image:linear-gradient(145deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0) 48%, rgba(0,0,0,0.22) 100%);padding:12px 14px;border-radius:2px;clip-path:polygon(0 0,100% 0,94% 100%,0 100%);box-shadow:0 4px 14px rgba(12,12,15,0.2);">
                <div style="font-size:22px;line-height:1.08;font-weight:900;letter-spacing:.04em;color:#ffffff;text-transform:uppercase;">House For Sale</div>
                <div style="padding-top:4px;font-size:13px;line-height:1.3;font-style:italic;font-weight:700;color:#e7edf4;">{{title}}</div>
                <div style="padding-top:7px;font-size:19px;line-height:1;font-weight:900;color:{{brandPrimary}};">{{price}}</div>
              </div>
            </td>
            <td width="32%" style="padding-left:8px;">
              <img src="{{altImage1Url}}" alt="Alt Photo 1" onerror="this.onerror=null;this.src='https://placehold.co/520x340/e9edf2/5f6670?text=Alt+Photo+1';" style="width:100%;height:120px;display:block;object-fit:cover;border-radius:2px 2px 0 0;">
              <div style="background:{{brandPrimary}};color:{{brandDark}};padding:7px 8px;text-align:center;font-size:11px;font-weight:900;letter-spacing:.11em;text-transform:uppercase;">Bathroom</div>
            </td>
          </tr>
        </table>
      </td>
    </tr>

    <tr>
      <td style="padding:10px 12px 0;background:transparent;">
        <table width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td width="33%" style="padding-right:8px;">
              <img src="{{altImage2Url}}" alt="Alt Photo 2" onerror="this.onerror=null;this.src='https://placehold.co/520x340/e9edf2/5f6670?text=Alt+Photo+2';" style="width:100%;height:92px;display:block;object-fit:cover;border-radius:2px 2px 0 0;">
              <div style="background:{{brandPrimary}};color:{{brandDark}};padding:6px 8px;text-align:center;font-size:11px;font-weight:900;letter-spacing:.11em;text-transform:uppercase;">Bedroom</div>
            </td>
            <td width="34%" style="padding:0 8px;">
              <img src="{{altImage3Url}}" alt="Alt Photo 3" onerror="this.onerror=null;this.src='https://placehold.co/520x340/e9edf2/5f6670?text=Alt+Photo+3';" style="width:100%;height:92px;display:block;object-fit:cover;border-radius:2px 2px 0 0;">
              <div style="background:{{brandPrimary}};color:{{brandDark}};padding:6px 8px;text-align:center;font-size:11px;font-weight:900;letter-spacing:.11em;text-transform:uppercase;">Living Room</div>
            </td>
            <td width="33%" style="padding-left:8px;">
              <div style="height:132px;background:{{brandDark}};background-image:linear-gradient(155deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0) 55%, rgba(0,0,0,0.24) 100%);padding:12px;border-radius:2px;box-shadow:0 4px 14px rgba(12,12,15,0.2);">
                <div style="font-size:13px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:#f4f7fb;">Get In Touch</div>
                <div style="padding-top:11px;font-size:18px;font-weight:900;line-height:1.2;color:#ffffff;word-break:break-word;">{{phone}}</div>
                <div style="margin-top:8px;width:56px;height:4px;background:{{brandPrimary}};"></div>
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>

    <tr>
      <td style="padding:10px 12px 12px;background:transparent;">
        <table width="100%" cellpadding="0" cellspacing="0">
          <tr>
            <td width="68%" valign="top" style="padding-right:10px;">
              <div style="background:rgba(255,252,247,0.74);background-image:linear-gradient(165deg, rgba(255,255,255,0.8) 0%, rgba(248,240,230,0.8) 52%, rgba(237,227,213,0.84) 100%);border:1px solid rgba(221,207,190,0.82);border-radius:2px;padding:10px 10px 9px;">
                <div style="font-size:16px;line-height:1.2;font-weight:900;color:{{brandDark}};text-transform:uppercase;letter-spacing:.03em;">Welcome To <span style="color:{{brandPrimary}};">{{brandName}}</span></div>
                <div style="padding-top:4px;font-size:12px;line-height:1.3;color:#667487;font-weight:700;">{{propertyAddress}} | {{city}}</div>
                <table width="100%" cellpadding="0" cellspacing="0" style="margin-top:8px;">
                  <tr>
                    <td width="24%" valign="top" style="padding-right:10px;border-right:1px solid rgba(0,0,0,0.12);">
                      <img src="{{agentImageUrl}}" alt="{{agentName}}" onerror="this.onerror=null;this.src='https://placehold.co/180x180/e9edf2/5f6670?text=Headshot';" style="width:100%;max-width:88px;height:88px;display:block;object-fit:cover;border-radius:2px;border:2px solid rgba(0,0,0,0.12);">
                    </td>
                    <td width="76%" valign="top" style="padding-left:10px;">
                      <div style="font-size:12px;line-height:1.65;color:#364352;">{{description}}</div>
                    </td>
                  </tr>
                </table>
              </div>
            </td>
            <td width="32%" valign="top" style="padding-left:10px;">
              <div style="background:rgba(214,160,0,0.86);background-image:linear-gradient(160deg, rgba(255,255,255,0.24) 0%, rgba(255,255,255,0.08) 44%, rgba(0,0,0,0.12) 100%);color:{{brandDark}};padding:12px;min-height:182px;border-radius:2px;box-shadow:0 4px 14px rgba(214,160,0,0.22);">
                <div style="font-size:17px;line-height:1;font-weight:900;letter-spacing:.08em;text-transform:uppercase;">Contact Us</div>
                <div style="padding-top:10px;font-size:12px;line-height:1.55;font-weight:700;">{{agentName}}</div>
                <div style="padding-top:3px;font-size:12px;line-height:1.55;font-weight:700;">{{email}}</div>
                <div style="padding-top:3px;font-size:12px;line-height:1.55;font-weight:700;">{{phone}}</div>
                <div style="padding-top:9px;">
                  <a href="{{ctaUrl}}" style="display:inline-block;background:{{brandDark}};color:#ffffff;text-decoration:none;padding:8px 10px;border-radius:2px;font-size:11px;font-weight:900;letter-spacing:.09em;text-transform:uppercase;">{{ctaLabel}}</a>
                </div>
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
